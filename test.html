<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Backend Test</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #6366f1; color: white; border: none; border-radius: 8px; transition: 0.3s; }
        button:hover { background: #4f46e5; }
        button:disabled { background: #444; cursor: not-allowed; }
        #status { margin-top: 20px; color: #aaa; }
    </style>
</head>
<body>
    <h1>AI Interviewer Voice Test</h1>
    <button id="playBtn">Start Interview Question</button>
    <p id="status">Ready to test...</p>

    <script>
        const playBtn = document.getElementById('playBtn');
        const status = document.getElementById('status');

        playBtn.addEventListener('click', async () => {
            status.innerText = "Thinking and generating voice...";
            playBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:3000/api/interview/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userMessage: "I am ready for my React interview. Please ask me a hard question.",
                        history: []
                    })
                });

                if (!response.ok) throw new Error("Backend failed");

                // --- THE BINARY STREAM LOGIC ---
                // We turn the binary stream into a "Blob" (Binary Large Object)
                const audioBlob = await response.blob();
                // Create a temporary URL for the audio data
                const audioUrl = URL.createObjectURL(audioBlob);
                
                const audio = new Audio(audioUrl);
                status.innerText = "Interviewer is speaking...";
                
                audio.play();
                
                audio.onended = () => {
                    status.innerText = "Finished. Ready for next test.";
                    playBtn.disabled = false;
                    URL.revokeObjectURL(audioUrl); // Clean up memory
                };

            } catch (err) {
                console.error(err);
                status.innerText = "Error: " + err.message;
                playBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
